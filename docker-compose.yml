
services:
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/ai-front:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      WATCHPACK_POLLING: "true"

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/laravel:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    expose:
     - "9000" 
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306   # ✅ should match container port, not external
      DB_DATABASE: laravel
      DB_USERNAME: artour
      DB_PASSWORD: secret
    command: php artisan serve --host=0.0.0.0 --port=8000
    

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: always
    ports:
    - "8081:80"   # open phpMyAdmin at http://localhost:8081
    environment:
      PMA_HOST: db         # connect to your db service
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
    - db
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: artour
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"   # ✅ external:internal
    volumes:
      - dbdata:/var/lib/mysql
  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8080:80"   # host:container
    volumes:
      - ./backend/laravel:/var/www
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  dbdata: {}